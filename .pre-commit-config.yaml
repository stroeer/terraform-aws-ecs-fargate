repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.104.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --init-args=-backend=false
      - id: terraform_tflint
      - id: terraform_docs
        args:
          - '--args=--lockfile=false'
  - repo: local
    hooks:
      - id: wizcli-scan
        name: Wiz scan
        entry: ./scripts/wizcli-scan.sh
        language: script
        files: \.tf$
        require_serial: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
